<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crumbs & Giggles</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav>
        <span>crumbs & giggles</span>
        <a href="index.html">Home</a>
    </nav>

    <div id="result-container">

        <div id="personality-section">
            <p>You're a</p>
            <h1 id="personality-name">Flavor Explorer!</h1>
            <p id="personality-desc">Loading your result...</p>
        </div>

        <div id="cookie-section">
            <img id="cookie-image" src="" alt="Your cookie match" width="300">
            <p>Your Perfect Match:</p>
            <h2 id="cookie-name">Loading...</h2>
            <div id="cookie-tags"></div>
            <div id="why-box">
                <h3>Why this cookie?</h3>
                <ul id="why-list"></ul>
            </div>
        </div>

        <a id="find-cookie-btn" href="customize.html">Find Your Cookie →</a>
        <a id="share-btn" href="#">Share Your Match</a>

    </div>

    <p id="error-message" style="display:none">Please take the quiz first! <a href="quiz.html">Go to Quiz</a></p>

    <script src="js/script.js"></script>
</body>

</html>
